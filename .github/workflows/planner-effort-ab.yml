name: planner-effort-ab

# One-off A/B: runs the golden DETECTION eval at effort=medium (current default) and effort=low,
# so we can compare plan quality (pass/fail, clip counts, theme) AND the real output-token/cost delta
# (CostMeter logs `[CostMeter] planner: ... out=... est=$...`). Detection eval ONLY — no scoring/TTS/
# video — so the A/B costs ~2 × ~$0.28. Dispatch-only; delete once the effort decision is logged.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  planner-effort-ab:
    name: planner-effort-ab
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      EVAL_MODE: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci

      - name: A — BASELINE effort=medium (current shipped default)
        run: PLANNER_EFFORT=medium npx tsx src/evals/detect.eval.ts

      - name: B — CANDIDATE effort=low
        if: ${{ always() }} # run B even if A had a fixture fail, so we always get both sides
        run: PLANNER_EFFORT=low npx tsx src/evals/detect.eval.ts
