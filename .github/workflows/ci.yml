name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- WEB (Next.js backend + marketing) — REQUIRED check ----
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          # No real API keys in CI — live-API tests must be gated behind a flag
          # (e.g. RUN_LIVE=1) so the normal suite never spends.
          NEXT_PUBLIC_APP_URL: https://example.com
          NEXT_PUBLIC_IOS_APP_STORE_URL: https://apps.apple.com/app/id000000000

  # ---- WEB LINT — non-blocking (informational) ----
  web-lint:
    name: web-lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ---- iOS (Swift app) ----
  # Kept NON-required until reliably green. The repo currently has NO shared Xcode
  # scheme and Package.swift declares NO test target, so the scheme/test wiring
  # likely needs a one-time fix (the loop's first iOS task: get this green, then
  # promote `ios` to a required check).
  ios:
    name: ios
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.app 2>/dev/null || xcode-select -p
      - name: List schemes (diagnostic)
        run: xcodebuild -list -project HighlightMagic.xcodeproj || xcodebuild -list || true
      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          DEST='platform=iOS Simulator,name=iPhone 16,OS=latest'
          xcodebuild -scheme HighlightMagic -destination "$DEST" clean build test \
          || xcodebuild -project HighlightMagic.xcodeproj -scheme HighlightMagic -destination "$DEST" clean build test
