name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- WEB (Next.js backend + marketing) — REQUIRED check ----
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          # No real API keys in CI — live-API tests must be gated behind a flag
          # (e.g. RUN_LIVE=1) so the normal suite never spends.
          NEXT_PUBLIC_APP_URL: https://example.com
          NEXT_PUBLIC_IOS_APP_STORE_URL: https://apps.apple.com/app/id000000000

  # ---- WEB LINT — REQUIRED check (zero warnings) ----
  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ---- WEB E2E (functional journey suite — BUILDS != WORKS) — REQUIRED check ----
  # Replays the real end-to-end user journeys against a built+started app and asserts the
  # intended OUTCOMES (Playwright; its webServer runs `npm run build && next start`).
  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # TEST-ONLY per-IP rate-limit bypass: one CI runner replays the self-seeding journeys from a
      # single IP and would trip the per-IP limit. PRODUCTION/Vercel MUST NEVER set this var.
      E2E_RATELIMIT_BYPASS: "1"
      # TURNSTILE_SECRET_KEY intentionally UNSET => CAPTCHA fails open => the waitlist runs keyless.
      # No DB to migrate (web/ has no SQL DB; optional Vercel KV falls back to in-memory when unset).
      NEXT_PUBLIC_APP_URL: https://example.com
      NEXT_PUBLIC_IOS_APP_STORE_URL: https://apps.apple.com/app/id000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install Playwright (chromium)
        run: npx --yes playwright install --with-deps chromium
      - name: Functional journey suite (build + start + drive real journeys)
        run: npm run test:e2e

  # ---- VALIDATE-CAPABILITIES — self-validation completeness gate (per-PR) — REQUIRED check ----
  # Fails if any external service/secret the runtime code reads is NOT registered in
  # web/src/lib/validation-manifest.ts with a validation path. A brand-new, unregistered service
  # CANNOT merge — the loop must register it + build its validation first (keyless contract test for
  # `mock`; an eval + an OWNER_ACTION for the key for `live-eval`). Readiness mode lives in preflight.
  validate-capabilities:
    name: validate-capabilities
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Capability manifest completeness (no unregistered external service can merge)
        run: npx vitest run src/lib/validation-manifest.test.ts

  # ---- iOS (Swift app) ----
  # Kept NON-required until reliably green, then promote `ios` to a required check.
  # The app builds as a SwiftPM package (Package.swift, target HighlightMagic +
  # test target HighlightMagicTests); xcodebuild resolves the package scheme.
  ios:
    name: ios
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting $LATEST"
          [ -n "$LATEST" ] && sudo xcode-select -switch "$LATEST/Contents/Developer" || xcode-select -p
          xcodebuild -version
      - name: List schemes (diagnostic)
        run: xcodebuild -list || true
      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          # Runner-provided simulators vary; create one explicitly and target it by UDID.
          xcrun simctl list runtimes available
          RUNTIME=$(xcrun simctl list runtimes available \
            | grep -oE 'com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]+' | tail -1)
          echo "Using iOS runtime: $RUNTIME"
          UDID=$(xcrun simctl create ci-iphone 'iPhone 16' "$RUNTIME")
          echo "Created simulator: $UDID"
          xcodebuild -scheme HighlightMagic -destination "id=$UDID" clean build test
