name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded in-progress runs for the same PR. The autonomous loop pushes commits in rapid
# succession; without this, every intermediate push ran full CI (incl. the 10x macOS iOS job) to
# completion even though only the latest commit matters. PR runs are cancellable; main runs finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---- WEB (Next.js backend + marketing) — REQUIRED check ----
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          # No real API keys in CI — live-API tests must be gated behind a flag
          # (e.g. RUN_LIVE=1) so the normal suite never spends.
          NEXT_PUBLIC_APP_URL: https://example.com
          NEXT_PUBLIC_IOS_APP_STORE_URL: https://apps.apple.com/app/id000000000

  # ---- WEB LINT — REQUIRED check (zero warnings) ----
  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ---- WEB E2E (functional journey suite — BUILDS != WORKS) — REQUIRED check ----
  # Replays the real end-to-end user journeys against a built+started app and asserts the
  # intended OUTCOMES (Playwright; its webServer runs `npm run build && next start`).
  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # TEST-ONLY per-IP rate-limit bypass: one CI runner replays the self-seeding journeys from a
      # single IP and would trip the per-IP limit. PRODUCTION/Vercel MUST NEVER set this var.
      E2E_RATELIMIT_BYPASS: "1"
      # TURNSTILE_SECRET_KEY intentionally UNSET => CAPTCHA fails open => the waitlist runs keyless.
      # No DB to migrate (web/ has no SQL DB; optional Vercel KV falls back to in-memory when unset).
      NEXT_PUBLIC_APP_URL: https://example.com
      NEXT_PUBLIC_IOS_APP_STORE_URL: https://apps.apple.com/app/id000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install Playwright (chromium)
        run: npx --yes playwright install --with-deps chromium
      - name: Functional journey suite (build + start + drive real journeys)
        run: npm run test:e2e

  # ---- VALIDATE-CAPABILITIES — self-validation completeness gate (per-PR) — REQUIRED check ----
  # Fails if any external service/secret the runtime code reads is NOT registered in
  # web/src/lib/validation-manifest.ts with a validation path. A brand-new, unregistered service
  # CANNOT merge — the loop must register it + build its validation first (keyless contract test for
  # `mock`; an eval + an OWNER_ACTION for the key for `live-eval`). Readiness mode lives in preflight.
  validate-capabilities:
    name: validate-capabilities
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Capability manifest completeness (no unregistered external service can merge)
        run: npx vitest run src/lib/validation-manifest.test.ts

  # ---- VALIDATE-GTM — GTM honesty gate (per-PR) — REQUIRED check ----
  # Fails CLOSED if a GROWTH_STATUS funnel/acquisition/pmf/channels metric is non-zero with NO connected
  # source declared (a real number with no source = fabrication risk), or if a present GTM_SCORECARD
  # doesn't parse / has invalid grades. The GTM analog of validate-capabilities. Readiness mode (the
  # GTM_SCORECARD-exists clause) is intentionally NOT wired into preflight: HighlightMagic has no GTM
  # Auditor routine producing a scorecard, so requiring one would gate on an unbuilt dependency.
  validate-gtm:
    name: validate-gtm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps (provides the DECLARED js-yaml parser — not transitive)
        run: npm ci --prefix web
      - name: GTM honesty gate (metric-without-a-source tripwire + scorecard validity)
        run: node scripts/validate-gtm.mjs

  # ---- CHANGE DETECTION — decides whether the expensive iOS (macOS, 10x) build must run ----
  # The vast majority of factory PRs touch web/** (or docs) only; the Swift app is a fully separate
  # codebase, so a web/docs change CANNOT affect the iOS build. Running the 10x macOS job on those
  # PRs is pure waste (the single biggest line in the org's Actions bill). This cheap ubuntu job
  # detects whether any iOS-relevant path changed so the macOS build runs ONLY when it can matter.
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Fail-safe: on any ambiguity dorny reports the filter as matched (build runs), so we never
          # skip iOS validation for a change that actually touched it.
          filters: |
            ios:
              - 'Sources/**'
              - 'Tests/**'
              - 'Package.swift'
              - 'Package.resolved'
              - 'Assets.xcassets/**'
              - '**/*.xcodeproj/**'
              - '.github/workflows/ci.yml'

  # ---- iOS BUILD (Swift app on macOS — 10x billing) — runs ONLY when iOS files changed ----
  # The app builds as a SwiftPM package (Package.swift, target HighlightMagic + test target
  # HighlightMagicTests); xcodebuild resolves the package scheme.
  ios-build:
    name: ios-build
    needs: detect-changes
    if: needs.detect-changes.outputs.ios == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting $LATEST"
          [ -n "$LATEST" ] && sudo xcode-select -switch "$LATEST/Contents/Developer" || xcode-select -p
          xcodebuild -version
      - name: List schemes (diagnostic)
        run: xcodebuild -list || true
      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          # Runner-provided simulators vary; create one explicitly and target it by UDID.
          xcrun simctl list runtimes available
          RUNTIME=$(xcrun simctl list runtimes available \
            | grep -oE 'com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]+' | tail -1)
          echo "Using iOS runtime: $RUNTIME"
          UDID=$(xcrun simctl create ci-iphone 'iPhone 16' "$RUNTIME")
          echo "Created simulator: $UDID"
          xcodebuild -scheme HighlightMagic -destination "id=$UDID" clean build test

  # ---- iOS (REQUIRED check) — cheap ubuntu gate over the macOS build ----
  # Branch protection requires a check named `ios`. This aggregator preserves that contract while
  # letting the 10x macOS build be path-gated: it PASSES when the build succeeded OR was skipped
  # (no iOS files changed) and FAILS only when the build actually failed/was cancelled. Net: a
  # web-only PR spends ZERO macOS minutes yet still satisfies the required `ios` check.
  ios:
    name: ios
    needs: [detect-changes, ios-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the iOS build result
        run: |
          detect="${{ needs.detect-changes.result }}"
          build="${{ needs.ios-build.result }}"
          echo "detect-changes: $detect | ios-build: $build (iOS files changed: ${{ needs.detect-changes.outputs.ios }})"
          if [ "$detect" != "success" ]; then
            echo "::error::change detection did not succeed — cannot safely skip the iOS build"; exit 1
          fi
          if [ "$build" = "failure" ] || [ "$build" = "cancelled" ]; then
            echo "::error::iOS build failed"; exit 1
          fi
          echo "iOS check satisfied (build result: $build)."
