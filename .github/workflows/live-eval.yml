name: live-eval

# Validates the REAL paid round-trips (Anthropic detection now; ElevenLabs/AtlasCloud as their evals
# land — ROADMAP G3) against the gold fixtures. This is NOT a required check and does NOT run on PRs:
# it spends real API tokens, so it runs on a cadence + on demand only. Owner-funded keys are GitHub
# Actions secrets (see OWNER_ACTIONS: validation-eval-keys). When a key is absent the matching step
# SKIPS cleanly and prints how to enable it — so this workflow never reddens the branch during setup.
#
# Provider spend caps (PENDING_OPS: spend-caps) are the backstop; keep the eval set small + cheap.

on:
  workflow_dispatch: # run manually / ON-SIGNAL (the loop triggers this when it changes a model id or
                     # the detect/score/plan/gen code, to validate that change — see ROADMAP G3)
    inputs:
      run_video:
        description: "Also run the EXPENSIVE AtlasCloud/Kling video eval (~$1). Set true ON-SIGNAL only when video/atlascloud code or the Kling model id changed."
        type: boolean
        default: false
  schedule:
    # WEEKLY (Mondays 09:00 UTC) — the CHEAP evals only (detection + scoring + TTS ≈ $0.30/run,
    # ~$1.2/mo). The expensive video-gen eval does NOT run on this cadence (see the video step's `if`).
    - cron: "0 9 * * 1"
    # MONTHLY (1st, 09:00 UTC) — a FULL run that ALSO includes the expensive video eval, so the
    # AtlasCloud/Kling round-trip is validated ~monthly (owner cost decision 2026-07-20). On-signal
    # video validation is via the workflow_dispatch `run_video` input above.
    - cron: "0 9 1 * *"

permissions:
  contents: read

jobs:
  live-eval:
    name: live-eval
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      EVAL_MODE: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ATLASCLOUD_API_KEY: ${{ secrets.ATLASCLOUD_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci

      - name: Detection eval (Anthropic — real planning round-trip vs gold fixtures)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: npx tsx src/evals/detect.eval.ts

      - name: Frame-scoring eval (Anthropic vision — REAL pixels through the real scorer) [G3 rung 2]
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: npx tsx src/evals/score.eval.ts

      - name: Anthropic evals SKIPPED (ANTHROPIC_API_KEY not set)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "::warning::ANTHROPIC_API_KEY not set — the real detection + frame-scoring round-trips were NOT validated."
          echo "Set it as a GitHub Actions secret (low-budget + capped) to enable. See OWNER_ACTIONS: validation-capability-anthropic."

      - name: TTS eval (ElevenLabs — real voiceover round-trip vs fixture bounds) [G3 rung 4]
        if: ${{ env.ELEVENLABS_API_KEY != '' }}
        run: npx tsx src/evals/elevenlabs.eval.ts

      - name: Video-gen eval (AtlasCloud/Kling — real image-to-video round-trip) [G3 rung 6]
        # The EXPENSIVE rung (~$0.50–1 per Kling job). To control spend (owner decision 2026-07-20) it
        # runs ONLY on the MONTHLY schedule (cron '0 9 1 * *') OR on-signal via workflow_dispatch with
        # run_video=true — NEVER on the weekly cron. Still needs the key; RUN_VIDEO_EVAL=1 + the in-code
        # EVAL_MAX_USD ceiling (aborts before any paid call) + the provider spend cap remain the backstops.
        if: ${{ env.ATLASCLOUD_API_KEY != '' && (github.event.schedule == '0 9 1 * *' || github.event.inputs.run_video == 'true') }}
        env:
          RUN_VIDEO_EVAL: "1"
        run: npx tsx src/evals/atlascloud.eval.ts
      # round-trip when the owner-funded key is present and skip+warn when it isn't.
